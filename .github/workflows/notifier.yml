# ─────────────────────────────────────────────────────────────────────────────
# CI/CD — Notifier
#
# Gatilho:
#   workflow_dispatch → Publicação manual → Docker Hub:
#                       bsourcedev/bsource-notifier:hml-X.Y.Z
#                       Acionar em: GitHub → Actions → CI/CD — Notifier
#                       → Run workflow
#
# Secrets necessários no repositório (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  — usuário do Docker Hub (ex.: bsourcedev)
#   DOCKERHUB_TOKEN     — Access Token gerado em hub.docker.com → Account Settings
#                         → Security → New Access Token (permissão: Read & Write)
#
# SemVer automático:
#   Calculado a partir de Conventional Commits pelo step "Calcular versão".
#   Como este workflow é manual, roda em dry-run e não cria tag git.
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Notifier

on:
  # Publicação acionada manualmente: Actions → CI/CD — Notifier → Run workflow
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build e publicação da imagem Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Histórico completo necessário para cálculo de SemVer

      - name: Calcular versão (SemVer)
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          tag_prefix: v

      - name: Definir tags da imagem Docker
        id: tags
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          IMAGE="bsourcedev/bsource-notifier"

          echo "tags=${IMAGE}:hml-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.new_version }}
